<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Store</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <nav>

            <img src="./images/google-logo.png" alt="Google Logo">
            <ul class="menu">
                <li>Phones</li>
                <li>Earbuds</li>
                <li>Watches</li>
                <li>Smart home</li>
                <li>Accessories</li>
                <li>Subscriptions</li>
            </ul>
            <img src="./images/icons/Search.svg">
            <img src="./images/icons/Help.svg">
            <img src="./images/icons/Cart.svg">
            <img src="./images/icons/Avatar.svg">
        </nav>
    </header>
    <main>
        <section class="galeria">
            <div class="arrow">
                <a href="./products.html"><img src="./images/icons/Arrow.svg">
                    <span>product details</span>
                </a>
            </div>
            <div class="earbods">
                <img src="./images/earbuds/earbuds_01.png">
                <img src="./images/earbuds/earbuds_02.png">
                <img src="./images/earbuds/earbuds_03.png">
                <img src="./images/earbuds/earbuds_04.png">
            </div>
            <div class="imgcentral">
                <img src="./images/earbuds/earbuds_01.png">
            </div>
        </section>
        <section class="info">
            <div class="info1">
                <h1>Google Pixel Buds Pro</h1>
                <p>Music & Sounds</p>
                <h2>229.00€</h2>
            </div>
            <hr>
            <div class="colorselection">
                <p>Choose a color</p>
            <div class="colors-row">
                <span class="color blue"></span>
                <span class="color gray"></span>
                <span class="color black"></span>
                <span class="color white"></span>
                <span class="color green"></span>
                <span class="color pink"></span>
            </div>
            </div>
             
            <article class="description">
            <section class="options">
            <div class="numbers">
            <h2>229.00€</h2>
            <hr>
                <select>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
                <button>Add to Cart</button>
            </div>

            
   <ul class="transport">
       <li class="delivery1">
          <img src="./images/icons/Delivery.svg">
          <p>Delivers 29 Apr to <strong>08023</strong></p>
      </li>
   </ul>
    </section>
    </main>
</body>

</html>
