<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Store</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
    <nav>

        <img src="./images/google-logo.png" alt="Google Store Logo">

        <ul class="menu">
            <li>
                <a href="./products.html" class="active">Phones</a>
            </li>
            <li>
                <a href="./products.html" class="active">Earbuds</a>
            </li>
            <li>
                <a href="./smartwatch.html" class="active">Watches</a>
            </li>
            <li>
                <a href="./products.html" class="active">Smart home</a>
            </li>
            <li>
                <a href="./products.html" class="active">Accessories</a>
            </li>
            <li>
                <a href="./products.html" class="active">Subscriptions</a>
            </li>
        </ul>


        <ul class="icons">
            <li>
                <img src="./images/icons/Search.svg" alt="Search">
            </li>
            <li>
                <img src="./images/icons/Help.svg" alt="Help">
            </li>
            <li>
                <img src="./images/icons/Cart.svg" alt="Cart">
            </li>
            <li>
                <img src="./images/icons/Avatar.svg" alt="Avatar">

            </li>
        </ul>
    </nav>
</header>


<main>
    <section class="gallery">

        <div class="arrow">
            <a href="#" class="back-link">
                <img src="./images/icons/Arrow.svg" alt="Back">
            </a>
            <p>See product details</p>
        </div>

        <div class="product-gallery">

            <div class="thumbnails">
                <img src="./images/earbuds/earbuds_01.png" data-image="./images/earbuds/earbuds_01.png" alt="earbuds">
                    <img src="./images/earbuds/earbuds_02.png" data-image="./images/earbuds/earbuds_02.png" alt="earbuds">
                    <img src="./images/earbuds/earbuds_03.png" data-image="./images/earbuds/earbuds_03.png" alt="earbuds">
                    <img src="./images/earbuds/earbuds_04.png" data-image="./images/earbuds/earbuds_04.png" alt="earbuds">
            </div>

            <div class="main-image">
                <img id="main-product-image" src="./images/earbuds/earbuds_01.png" class="con-borde">
            </div>

        </div>
    </section>


    <section class="product-info">

        <h1>Google Pixel Buds Pro</h1>
        <h2>Music & Sounds</h2>
        <p class="price">229.00€</p>


        <hr>

        <div class="colors">

            <h2>Choose a color</h2>

            <div class="color-list">
                <span class="color blue"></span>
                <span class="color gray"></span>
                <span class="color black"></span>
                <span class="color white"></span>
                <span class="color green"></span>
                <span class="color pink"></span>
            </div>

        </div>


        <div class="purchase">

            <p class="price-big">229.00€</p>

            <hr>

            <div class="purchase-controls">

                <select class="quantity">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                </select>

                <button>Add to Cart</button>
            </div>


            <div class="delivery">
                <img src="./images/icons/Delivery.svg">
                <p>Delivers 29 Apr to <strong>08023</strong></p>
            </div>

        </div>
    </section>

</main>


<footer>
    <div class="footer-container">

        <ul class="social">
            <li>
                <a href="#"><img src="./images/icons/SM-x.svg" alt="X"></a>
            </li>
            <li>
                <a href="#"><img src="./images/icons/SM-instagram.svg" alt="instagram"></a>
            </li>
            <li>
                <a href="#"><img src="./images/icons/SM-facebook.svg" alt="facebook"></a>
            </li>
            <li>
                <a href="#"><img src="./images/icons/SM-youtube.svg" alt="youtube"></a>
            </li>
            <li>
                <a href="#"><img src="./images/icons/SM-tiktok.svg" alt="tiktok"></a>
            </li>
        </ul>

        <div class="country">
            <img src="./images/icons/Spain.svg" alt="Spain">
            <p>Spain</p>
        </div>

        <div class="legal">
            <a href="#">Privacy</a>
            <a href="#">Sales Terms</a>
            <a href="#">Terms of Service</a>
        </div>
    </div>
</footer>
<script src="script.js"></script>
</body>
</html>
